---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 1.1.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 5m
  test:
    enable: false # Enable helm test
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  rollback:
    timeout: 10m
    cleanupOnFail: true
    recreate: true
  values:
    image:
      repository: ghcr.io/linuxserver/baseimage-alpine
      pullPolicy: Always
      tag: "3.17"

    service:
      main:
        enabled: false

    args:
      - sleep
      - infinity

    env:
      - name: DOCKER_MODS
        value: linuxserver/mods:universal-cloudflared
      - name: CF_ZONE_ID
        value: ${CF_ZONE_ID}
      - name: CF_ACCOUNT_ID
        value: ${CF_ACCOUNT_ID}
      - name: CF_API_TOKEN
        value: ${CF_API_TOKEN}
      - name: CF_TUNNEL_NAME
        value: ${MOBILECLUSTER_TUNNEL_NAME}
      - name: CF_TUNNEL_PASSWORD
        value: ${MOBILECLUSTER_TUNNEL_PASSWORD}
      - name: CF_TUNNEL_CONFIG
        value: |
          ingress:
            - hostname: m-api.eighty-three.me
              service: tcp://kubernetes.default.svc:443
              originRequest:
                proxyType: socks
            - hostname: m-podinfo.eighty-three.me
              service: http://podinfo.default.svc.cluster.local:9898
            - service: http_status:404
