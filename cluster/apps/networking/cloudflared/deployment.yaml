---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: cloudflared
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: baseimage
          image: ghcr.io/linuxserver/baseimage-alpine:3.15
          resources:
            limits:
              memory: "50Mi"
              cpu: "100m"
          args:
            - sleep
            - infinity
          env:
            - name: DOCKER_MODS
              value: linuxserver/mods:universal-cloudflared
            - name: CF_ZONE_ID
              value: ${CF_ZONE_ID}
            - name: CF_ACCOUNT_ID
              value: ${CF_ACCOUNT_ID}
            - name: CF_API_TOKEN
              value: ${CF_API_TOKEN}
            - name: CF_TUNNEL_NAME
              value: ${MOBILECLUSTER_TUNNEL_NAME}
            - name: CF_TUNNEL_PASSWORD
              value: ${MOBILECLUSTER_TUNNEL_PASSWORD}
            - name: CF_TUNNEL_CONFIG
              value: |
                ingress:
                  - hostname: podinfo.mcluster.eighty-three.me
                    service: http://podinfo.default.svc.cluster.local:9898
                  - service: http_status:404
